name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest
      - name: Ruff
        run: uv run ruff check src tests
